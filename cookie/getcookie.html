<!DOCTYPE html>
<html>
    <head>
        <title>Get Cookie</title>
    </head>
    <body>
    <div>Get Cookie</div>
        <script>
           function getCookie()  
    {  
        if(document.cookie.length!=0)  
        {  
        alert(document.cookie);  
        }  
        else  
        {  
        alert("Cookie not available");  
        }  
        }
        getCookie()
        </script>
    </body>
</html>
